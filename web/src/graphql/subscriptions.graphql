### coding_sessions ###

subscription OnCodingSessions {
  coding_sessions(limit: 100, order_by: { updated_at: desc }) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
}

subscription OnCodingSessionById($id: String!) {
  coding_sessions_by_pk(id: $id) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
}

