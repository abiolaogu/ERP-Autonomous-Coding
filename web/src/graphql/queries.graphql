### coding_sessions ###

query GetCodingSessions(
  $where: coding_sessions_bool_exp
  $order_by: [coding_sessions_order_by!]
  $limit: Int
  $offset: Int
) {
  coding_sessions(
    where: $where
    order_by: $order_by
    limit: $limit
    offset: $offset
  ) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
  coding_sessions_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}

query GetCodingSessionById($id: String!) {
  coding_sessions_by_pk(id: $id) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
}

