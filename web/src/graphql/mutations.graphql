### coding_sessions ###

mutation CreateCodingSession($object: coding_sessions_insert_input!) {
  insert_coding_sessions_one(object: $object) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
}

mutation UpdateCodingSession($id: String!, $set: coding_sessions_set_input!) {
  update_coding_sessions_by_pk(pk_columns: { id: $id }, _set: $set) {
    id
    user_id
    title
    description
    status
    language
    repository_id
    branch
    agent_id
    config
    started_at
    completed_at
    created_at
    updated_at
  }
}

mutation DeleteCodingSession($id: String!) {
  delete_coding_sessions_by_pk(id: $id) {
    id
  }
}

