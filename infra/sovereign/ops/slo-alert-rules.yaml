apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: erp-autonomous-coding-slo-alerts
  labels:
    app: erp-autonomous-coding
spec:
  groups:
    - name: erp-autonomous-coding.slo
      rules:
        - alert: ERPAutonomousCodingHighLatencyP95
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ERP-Autonomous-Coding p95 latency is above target"
        - alert: ERPAutonomousCodingAvailabilityBudgetBurn
          expr: (1 - (sum(rate(http_requests_total{status!~"5.."}[15m])) / sum(rate(http_requests_total[15m])))) > 0.001000
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "ERP-Autonomous-Coding error budget burn is above threshold"
