apiVersion: sovereign.billyronks/v1
kind: GATargetContract
metadata:
  name: erp-autonomous-coding
  generatedAt: "2026-02-28"
spec:
  category: "Autonomous Software Delivery"
  benchmarks:
    - "GitHub Copilot Workspace"
    - "Sourcegraph Cody"
    - "Cursor"
  northStar: "Enable policy-constrained autonomous engineering with measurable delivery acceleration."
  tenancy:
    model: hard-multi-tenant
    db:
      engine: yugabytedb
      isolation: rls-plus-tenant-context
    cache:
      engine: dragonflydb
      namespacePattern: tenant:{tenant_id}:*
    events:
      broker: redpanda
      topicPattern: tenant.{tenant_id}.{domain}.*
      requiredTopics:
        - "coding.plans"
        - "coding.runs"
        - "coding.reviews"
    realtime:
      engine: centrifugo
      channelPattern: tenant:{tenant_id}:{resource}
  reliability:
    availability: "99.9%"
    p95LatencyMs: 300
    mttrMinutes: 25
  releaseGates:
    - lint
    - test
    - build
    - policy-check
    - security-scan
    - deployment-verification
  operations:
    runbooksRequired: true
    rollbackWindowMinutes: 15
    gameDayRequired: true
